<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Life</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }
  #controls {
    position: fixed; top: 16px; left: 16px;
    background: rgba(10, 10, 20, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    color: #ccc;
    font-size: 13px;
    min-width: 220px;
    z-index: 10;
    transition: opacity 0.3s;
  }
  #controls h2 {
    font-size: 16px; font-weight: 600; color: #fff;
    margin-bottom: 14px; letter-spacing: 0.5px;
  }
  .control-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .control-row label { flex: 1; }
  .control-row input[type="range"] {
    width: 100px; accent-color: #6e8efb;
  }
  .control-row .val {
    width: 32px; text-align: right; font-variant-numeric: tabular-nums;
    color: #8e9eff;
  }
  button {
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    border: none; border-radius: 8px;
    color: #fff; padding: 8px 16px;
    cursor: pointer; font-size: 13px; font-weight: 500;
    width: 100%; margin-top: 6px;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(110,142,251,0.3); }
  button:active { transform: scale(0.98); }
  #matrix-display {
    margin-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 12px;
  }
  #matrix-display h3 {
    font-size: 12px; color: #888; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  table { border-collapse: collapse; width: 100%; }
  td {
    width: 28px; height: 22px; text-align: center;
    font-size: 10px; font-weight: 600;
    border-radius: 3px;
  }
  #fps {
    position: fixed; top: 16px; right: 16px;
    color: rgba(255,255,255,0.3); font-size: 12px;
    font-family: monospace;
  }
  #hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.2); font-size: 12px;
    transition: opacity 2s;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="controls">
  <h2>Particle Life</h2>
  <div class="control-row">
    <label>Particles</label>
    <input type="range" id="countSlider" min="200" max="3000" value="1200" step="100">
    <span class="val" id="countVal">1200</span>
  </div>
  <div class="control-row">
    <label>Species</label>
    <input type="range" id="speciesSlider" min="2" max="8" value="5">
    <span class="val" id="speciesVal">5</span>
  </div>
  <div class="control-row">
    <label>Radius</label>
    <input type="range" id="radiusSlider" min="40" max="200" value="100">
    <span class="val" id="radiusVal">100</span>
  </div>
  <div class="control-row">
    <label>Friction</label>
    <input type="range" id="frictionSlider" min="1" max="20" value="10">
    <span class="val" id="frictionVal">0.50</span>
  </div>
  <div class="control-row">
    <label>Force</label>
    <input type="range" id="forceSlider" min="1" max="20" value="10">
    <span class="val" id="forceVal">1.0</span>
  </div>
  <button id="randomizeBtn">Randomize Rules</button>
  <button id="resetBtn" style="background: linear-gradient(135deg, #444, #666);">Reset Positions</button>
  <div id="matrix-display">
    <h3>Interaction Matrix</h3>
    <table id="matrixTable"></table>
  </div>
</div>
<div id="fps"></div>
<div id="hint">Click and drag to attract particles</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = [
  [255, 80, 80],   // red
  [80, 200, 255],  // blue
  [80, 255, 120],  // green
  [255, 220, 60],  // yellow
  [200, 100, 255], // purple
  [255, 140, 60],  // orange
  [255, 100, 200], // pink
  [100, 255, 220], // cyan
];

let numParticles = 1200;
let numSpecies = 5;
let interactionRadius = 100;
let friction = 0.5;
let forceMult = 1.0;
let matrix = [];
let particles = [];

let mouse = { x: 0, y: 0, down: false };

canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => { mouse.down = true; });
canvas.addEventListener('mouseup', e => { mouse.down = false; });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouse.down = true;
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
});
canvas.addEventListener('touchend', () => { mouse.down = false; });

function randomMatrix() {
  matrix = [];
  for (let i = 0; i < numSpecies; i++) {
    matrix[i] = [];
    for (let j = 0; j < numSpecies; j++) {
      matrix[i][j] = Math.random() * 2 - 1;
    }
  }
  renderMatrix();
}

function renderMatrix() {
  const table = document.getElementById('matrixTable');
  let html = '<tr><td></td>';
  for (let j = 0; j < numSpecies; j++) {
    const c = COLORS[j];
    html += `<td style="color:rgb(${c[0]},${c[1]},${c[2]})">■</td>`;
  }
  html += '</tr>';
  for (let i = 0; i < numSpecies; i++) {
    const c = COLORS[i];
    html += `<tr><td style="color:rgb(${c[0]},${c[1]},${c[2]})">■</td>`;
    for (let j = 0; j < numSpecies; j++) {
      const v = matrix[i][j];
      const bg = v > 0
        ? `rgba(80,255,120,${Math.abs(v) * 0.4})`
        : `rgba(255,80,80,${Math.abs(v) * 0.4})`;
      html += `<td style="background:${bg};color:#fff">${v.toFixed(1)}</td>`;
    }
    html += '</tr>';
  }
  table.innerHTML = html;
}

function initParticles() {
  particles = [];
  for (let i = 0; i < numParticles; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: 0,
      vy: 0,
      species: Math.floor(Math.random() * numSpecies),
    });
  }
}

function simulate(dt) {
  const r = interactionRadius;
  const rSq = r * r;
  const halfR = r * 0.4;
  const n = particles.length;

  for (let i = 0; i < n; i++) {
    const p = particles[i];
    let fx = 0, fy = 0;

    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const q = particles[j];
      let dx = q.x - p.x;
      let dy = q.y - p.y;

      // Wrap around
      if (dx > W / 2) dx -= W;
      if (dx < -W / 2) dx += W;
      if (dy > H / 2) dy -= H;
      if (dy < -H / 2) dy += H;

      const dSq = dx * dx + dy * dy;
      if (dSq > rSq || dSq < 1) continue;

      const d = Math.sqrt(dSq);
      const attraction = matrix[p.species][q.species];

      let force;
      if (d < halfR) {
        // Repulsion at close range
        force = (d / halfR - 1);
      } else {
        // Attraction/repulsion at longer range
        force = attraction * (1 - Math.abs(2 * d - r - halfR) / (r - halfR));
      }

      fx += (dx / d) * force;
      fy += (dy / d) * force;
    }

    // Mouse attraction
    if (mouse.down) {
      let mdx = mouse.x - p.x;
      let mdy = mouse.y - p.y;
      const md = Math.sqrt(mdx * mdx + mdy * mdy);
      if (md < 200 && md > 1) {
        fx += (mdx / md) * 3;
        fy += (mdy / md) * 3;
      }
    }

    const forceFactor = r * forceMult * 0.5;
    p.vx = (p.vx + fx * forceFactor * dt) * (1 - friction);
    p.vy = (p.vy + fy * forceFactor * dt) * (1 - friction);
  }

  for (let i = 0; i < n; i++) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Wrap
    if (p.x < 0) p.x += W;
    if (p.x >= W) p.x -= W;
    if (p.y < 0) p.y += H;
    if (p.y >= H) p.y -= H;
  }
}

function draw() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.25)';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const c = COLORS[p.species];
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const glow = Math.min(speed * 0.15, 1);
    const size = 2 + glow * 1.5;

    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${0.7 + glow * 0.3})`;
    ctx.fill();

    if (glow > 0.3) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, size + 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${glow * 0.15})`;
      ctx.fill();
    }
  }
}

// FPS counter
let frameCount = 0, lastFpsTime = performance.now();
const fpsEl = document.getElementById('fps');

function loop() {
  simulate(0.016);
  draw();

  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsEl.textContent = `${frameCount} fps`;
    frameCount = 0;
    lastFpsTime = now;
  }

  requestAnimationFrame(loop);
}

// Controls
const countSlider = document.getElementById('countSlider');
const speciesSlider = document.getElementById('speciesSlider');
const radiusSlider = document.getElementById('radiusSlider');
const frictionSlider = document.getElementById('frictionSlider');
const forceSlider = document.getElementById('forceSlider');

countSlider.oninput = () => {
  document.getElementById('countVal').textContent = countSlider.value;
  numParticles = parseInt(countSlider.value);
  initParticles();
};
speciesSlider.oninput = () => {
  document.getElementById('speciesVal').textContent = speciesSlider.value;
  numSpecies = parseInt(speciesSlider.value);
  randomMatrix();
  initParticles();
};
radiusSlider.oninput = () => {
  document.getElementById('radiusVal').textContent = radiusSlider.value;
  interactionRadius = parseInt(radiusSlider.value);
};
frictionSlider.oninput = () => {
  friction = parseInt(frictionSlider.value) / 20;
  document.getElementById('frictionVal').textContent = friction.toFixed(2);
};
forceSlider.oninput = () => {
  forceMult = parseInt(forceSlider.value) / 10;
  document.getElementById('forceVal').textContent = forceMult.toFixed(1);
};

document.getElementById('randomizeBtn').onclick = () => { randomMatrix(); };
document.getElementById('resetBtn').onclick = () => { initParticles(); };

// Fade hint
setTimeout(() => {
  document.getElementById('hint').style.opacity = '0';
}, 5000);

// Init
randomMatrix();
initParticles();
loop();
</script>
</body>
</html>
